# ══════════════════════════════════════════════════════════════
# Smart HR Attendance & Reconciliation Tool — Application Config
# ══════════════════════════════════════════════════════════════

spring:
  application:
    name: smart-hr-attendance

  # ─── Database Configuration ───────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/smarthr_db
    username: ${DB_USERNAME:smarthr}
    password: ${DB_PASSWORD:smarthr_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # ─── JPA / Hibernate ─────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate  # Flyway handles schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50       # Batch inserts for reconciliation discrepancies
        order_inserts: true
        order_updates: true

  # ─── Flyway Migration ────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── File Upload Limits ──────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB      # Max single file (Excel or doctor note)
      max-request-size: 15MB   # Max total request size

# ─── Application-Specific Config ───────────────────────────
app:
  reconciliation:
    late-arrival-grace-minutes: 15     # Minutes after shift start before flagging
    early-departure-grace-minutes: 15  # Minutes before shift end before flagging
    hours-variance-threshold: 0.5      # Hours variance for part-time mismatch
  
  security:
    jwt-secret: ${JWT_SECRET:change-me-in-production-this-is-unsafe}
    jwt-expiration-ms: 900000          # 15 minutes
    refresh-expiration-ms: 604800000   # 7 days

  storage:
    provider: minio                     # minio | s3
    bucket-name: smarthr-documents
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}

# ─── Logging ───────────────────────────────────────────────
logging:
  level:
    com.smarthr.attendance: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# ─── API Documentation ────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
